<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>DICE GAMES FINAL</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#060816;color:#fff;font-family:monospace}
body{position:fixed;inset:0}
#app{height:100dvh;padding:max(env(safe-area-inset-top),10px) 10px max(env(safe-area-inset-bottom),14px);display:flex;justify-content:center;background:radial-gradient(circle at top,var(--pc,#263d86),#060816 72%);transition:.25s}
.game{width:100%;max-width:430px;height:100%;border:5px solid var(--pc,#ffe27a);border-radius:18px;background:linear-gradient(180deg,var(--pbg,#10172d),#080b18);box-shadow:0 0 0 5px #000,0 0 30px var(--pc,#416cff);position:relative;overflow:hidden;padding:10px;transition:.25s}
.game:before{content:"";position:absolute;inset:0;background:radial-gradient(#8fe9ff 1.5px,transparent 2px) 20px 30px/90px 90px;opacity:.42}
.game:after{content:"";position:absolute;inset:0;background:linear-gradient(transparent 50%,rgba(255,255,255,.04) 51%);background-size:100% 6px;pointer-events:none;z-index:9}
.ui{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;gap:8px}
.title{text-align:center;font-size:25px;font-weight:900;color:#ffe27a;text-shadow:3px 3px #000,5px 5px var(--pc,#5d39ff);letter-spacing:2px}
.row{display:flex;gap:7px}
button{font-family:monospace;font-weight:900;color:#fff;background:linear-gradient(180deg,var(--pc,#263b77),#1d2c63);border:4px solid #fff;box-shadow:4px 4px #000;text-shadow:2px 2px #000}
button:active{transform:translate(3px,3px);box-shadow:1px 1px #000}
.small{flex:1;height:38px;font-size:13px}.gold{background:#a66b10;color:#fff3b0}.red{background:#842036}.green{background:#16724d}
.hud{display:grid;grid-template-columns:1fr 1.25fr 1fr;gap:7px}
.panel{border:3px solid #fff;background:#091024;box-shadow:3px 3px #000;text-align:center;padding:6px;font-size:12px;color:#9be7ff}
.big{display:block;color:#ffe27a;font-size:20px;text-shadow:3px 3px #000}
.menu{flex:1;display:flex;flex-direction:column;gap:10px;justify-content:center}
.menuBtn{height:86px;font-size:28px;background:linear-gradient(#31498f,#1d2c63)}
.jk{height:54px;font-size:24px;background:linear-gradient(#31498f,#1d2c63);color:#ffe27a}
.jk.on{background:linear-gradient(#e0a91f,#9f6c0c);color:#fff3b0}
.go{height:66px;font-size:40px;background:linear-gradient(#31b95f,#16713b)}
.msg{text-align:center;height:26px;font-size:23px;color:#ffe27a;text-shadow:4px 4px #000}
.playerPick{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.pbtn{height:44px;font-size:18px}
.pbtn.on{filter:brightness(1.35);box-shadow:4px 4px #000,0 0 14px var(--pc,#ffe27a)}
.turnBanner{height:40px;border:3px solid #fff;background:linear-gradient(90deg,var(--pc,#ffe27a),#10172d 72%);box-shadow:3px 3px #000,0 0 14px var(--pc,#ffe27a);display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:900;color:#fff;text-shadow:3px 3px #000;letter-spacing:1px}
.playerDot{display:inline-block;width:12px;height:12px;background:var(--pc,#ffe27a);border:2px solid #fff;box-shadow:2px 2px #000;margin-right:6px;vertical-align:-1px}
.hud .panel.activeP{border-color:var(--pc,#ffe27a);box-shadow:3px 3px #000,0 0 16px var(--pc,#ffe27a)}
.playerList{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.playerChip{border:2px solid #fff;background:#091024;box-shadow:2px 2px #000;padding:3px;text-align:center;font-size:11px;color:#fff}
.playerChip.on{background:var(--pc,#ffe27a);color:#fff;text-shadow:2px 2px #000}
.grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;align-content:center;justify-items:center}
.card{width:100%;max-width:82px;aspect-ratio:3.5/2.45;border:3px solid #111;border-radius:10px;box-shadow:0 0 0 3px #fff,0 0 0 5px #000,0 0 12px #4d7cff;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.back{background:linear-gradient(135deg,#0f2558,#071027)}
.back:before{content:"";position:absolute;inset:7px;border:3px solid #ffe27a;box-shadow:inset 0 0 0 3px #284a9a}
.back:after{content:"";position:absolute;inset:14px;background:repeating-linear-gradient(45deg,#ffe27a 0 4px,transparent 4px 8px),repeating-linear-gradient(-45deg,#4d7cff 0 4px,transparent 4px 8px);filter:drop-shadow(2px 2px #000)}
.open{animation:pop .16s ease}
.safeCard{background:radial-gradient(circle at 50% 40%,#fff7c2,#d8a83a 65%,#8b5d16)}
.jokerCard{background:radial-gradient(circle at 50% 40%,#ffdddd,#8b1028 70%,#31000c);box-shadow:0 0 0 3px #fff,0 0 0 5px #000,0 0 22px #ff3860}
.icon{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:50px;height:50px;image-rendering:pixelated}
.diceBox{height:58px;display:flex;align-items:center;justify-content:center;perspective:500px}
.diceBox.ready{animation:diceGlow .9s infinite alternate}
.dice{width:48px;height:48px;position:relative;transform-style:preserve-3d;transition:.45s cubic-bezier(.15,1.2,.3,1)}
.roll{animation:spin .4s steps(8) infinite}
.face{position:absolute;width:48px;height:48px;background:#f8f0d0;border:4px solid #111;box-shadow:inset -6px -6px #b8a56e,inset 4px 4px #fff}
.f1{transform:rotateX(90deg) translateZ(24px)}.f2{transform:translateZ(24px)}.f3{transform:rotateY(90deg) translateZ(24px)}.f4{transform:rotateY(-90deg) translateZ(24px)}.f5{transform:rotateY(180deg) translateZ(24px)}.f6{transform:rotateX(-90deg) translateZ(24px)}
.show1{transform:rotateX(-90deg)}.show2{transform:rotateX(0)}.show3{transform:rotateY(-90deg)}.show4{transform:rotateY(90deg)}.show5{transform:rotateY(180deg)}.show6{transform:rotateX(90deg)}
.dot{position:absolute;width:7px;height:7px;background:#111}.c{left:17px;top:17px}.tl{left:8px;top:8px}.tr{right:8px;top:8px}.bl{left:8px;bottom:8px}.br{right:8px;bottom:8px}.ml{left:8px;top:17px}.mr{right:8px;top:17px}
.stage{flex:1;position:relative;overflow:hidden;border:4px solid #fff;background:radial-gradient(circle at top,var(--pbg,#101936),#070b18 72%);box-shadow:4px 4px #000,0 0 18px var(--pc,#4d7cff);touch-action:manipulation;transition:.25s}
.centerLine{position:absolute;left:50%;top:0;bottom:0;width:3px;background:#ffe27a;box-shadow:0 0 12px #ffe27a;z-index:2;opacity:.55}
.dropGuide{position:absolute;left:0;right:0;top:106px;height:2px;background:rgba(255,226,122,.75);box-shadow:0 0 10px #ffe27a;z-index:4}
.ghostGuide{position:absolute;width:62px;height:62px;border:3px dashed rgba(255,226,122,.6);z-index:3;transform:translate(-50%,-50%);opacity:.85}
.ground{position:absolute;left:0;right:0;bottom:14px;height:10px;background:#5b3b18;border-top:4px solid #ffe27a;z-index:3}
.stack{position:absolute;left:0;right:0;top:0;bottom:0;z-index:1;transform-origin:50% 108px}
.previewDice,.towerDie,.fallDie{position:absolute;width:62px;height:62px;background:#f8f0d0;border:5px solid #111;box-shadow:inset -7px -7px #b8a56e,inset 4px 4px #fff,0 0 12px #ffe27a}
.previewDice{z-index:5;transform:translate(-50%,-50%)}
.fallDie{z-index:6;transform:translate(-50%,-50%);transition:none}
.towerDie{z-index:2;transition:left .18s ease,top .26s ease,transform .18s ease}
.land{animation:land .10s ease}
.warn{animation:warn .25s infinite alternate}
.dangerShake{animation:dangerShake .16s infinite alternate}
.towerMini{position:absolute;right:6px;top:6px;width:58px;height:92px;border:3px solid #fff;background:#071027;box-shadow:3px 3px #000,0 0 10px #4d7cff;z-index:8;overflow:hidden}
.towerMini:before{content:"";position:absolute;left:50%;top:4px;bottom:4px;width:1px;background:#ffe27a;opacity:.45}
.miniDie{position:absolute;width:6px;height:6px;background:#f8f0d0;border:1px solid #111;box-shadow:0 0 3px #ffe27a}
.collapseDie{position:absolute;width:62px;height:62px;background:#f8f0d0;border:5px solid #111;box-shadow:inset -7px -7px #b8a56e,inset 4px 4px #fff,0 0 12px #ffe27a;z-index:10;transition:transform .9s cubic-bezier(.2,.9,.25,1.1),left .9s ease,top .9s ease,opacity .9s ease}
.collapseFlash{animation:collapseFlash .45s ease 2}
@keyframes collapseFlash{0%{filter:brightness(1)}50%{filter:brightness(2.3) drop-shadow(0 0 20px #ff3860)}100%{filter:brightness(1)}}
@keyframes pop{0%{transform:scale(.72);filter:brightness(2)}100%{transform:scale(1)}}
@keyframes diceGlow{to{filter:drop-shadow(0 0 12px #ffe27a) drop-shadow(0 0 16px #4d7cff);transform:scale(1.04)}}
@keyframes spin{to{transform:rotateX(560deg) rotateY(660deg) rotateZ(180deg)}}
@keyframes warn{from{filter:drop-shadow(0 0 0 red)}to{filter:drop-shadow(0 0 18px red)}}
@keyframes dangerShake{from{transform:translateX(-5px) rotate(-1.2deg)}to{transform:translateX(5px) rotate(1.2deg)}}
@keyframes land{0%{filter:brightness(1.45)}100%{filter:brightness(1)}}

/* JOKER SHOT RESULT + DRINK FLOW */
.shotResult,.shotTrans{position:absolute;inset:0;z-index:80;background:rgba(3,5,14,.86);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;pointer-events:auto;overflow:hidden;animation:shotScreenShake .42s steps(3) forwards;cursor:pointer}
.shotResult:before,.shotTrans:before{content:"";position:absolute;inset:0;background:linear-gradient(transparent 50%,rgba(255,255,255,.06) 51%);background-size:100% 6px;z-index:1;mix-blend-mode:screen;pointer-events:none}
.shotResultBox,.shotTitle,.shotTray,.shotCount{position:relative;z-index:3}
.shotResultBox{text-align:center;border:4px solid #fff;background:#091024;box-shadow:5px 5px #000,0 0 24px var(--pc,#ffe27a);padding:22px 24px;min-width:250px}
.shotResultBox .r1{font-size:24px;color:#9be7ff;text-shadow:3px 3px #000;font-weight:900;letter-spacing:1px}
.shotResultBox .r2{font-size:58px;color:#ffe27a;text-shadow:4px 4px #000,0 0 18px #ffe27a;font-weight:900;margin-top:8px}
.shotResultBox .r3{font-size:13px;color:#fff;text-shadow:2px 2px #000;margin-top:10px;letter-spacing:1px}
.shotTitle{text-align:center;font-size:28px;font-weight:900;color:#ffe27a;text-shadow:3px 3px #000,5px 5px var(--pc,#5d39ff);letter-spacing:2px;line-height:1.15}
.shotHint{font-size:13px;color:#9be7ff;text-shadow:2px 2px #000;margin-top:6px;letter-spacing:1px}
.shotCount{font-size:48px;color:#fff;text-shadow:4px 4px #000,0 0 18px #ffe27a}
.shotTray{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;max-width:340px;padding:4px 12px}
.shotTray.onlyCups{max-width:360px;gap:14px;transform:scale(1.08)}
.shotCup{width:58px;height:78px;position:relative;border:4px solid #fff;box-shadow:4px 4px #000,0 0 0 3px #111,0 0 18px var(--pc,#ffe27a);background:linear-gradient(180deg,rgba(255,255,255,.16) 0 28%,#ffe27a 29%,#d99022 62%,#8a4f11 100%);clip-path:polygon(16% 0,84% 0,69% 100%,31% 100%);animation:shotCupPop .18s ease both}
.shotCup:after{content:"";position:absolute;left:17%;right:17%;top:18%;height:8px;background:#fff6c7;box-shadow:0 0 10px #fff;border-radius:999px}
.shotCup.empty{background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.04));filter:grayscale(.4) brightness(.72);box-shadow:4px 4px #000,0 0 0 3px #111}
.shotCup.empty:after{opacity:.18}
.shotCup.drink{animation:shotDrink .34s cubic-bezier(.18,1.35,.22,1) forwards}
.shotFlash{position:absolute;z-index:2;left:50%;top:50%;width:14px;height:14px;background:#ffe27a;box-shadow:0 0 16px #ffe27a;transform:translate(-50%,-50%);animation:shotPixelBurst .36s steps(3) forwards;pointer-events:none}
@keyframes shotScreenShake{0%,100%{transform:translate(0)}25%{transform:translate(4px,-3px)}50%{transform:translate(-4px,3px)}75%{transform:translate(3px,2px)}}
@keyframes shotCupPop{0%{transform:translateY(80px) scale(.55);filter:brightness(2.2)}100%{transform:translateY(0) scale(1)}}
@keyframes shotDrink{0%{transform:rotate(0) scale(1);opacity:1}45%{transform:rotate(16deg) translateY(-18px) scale(1.08);filter:brightness(1.8)}100%{transform:rotate(-8deg) translateY(-70px) scale(.35);opacity:0}}
@keyframes shotPixelBurst{0%{box-shadow:0 0 #ffe27a;opacity:1}100%{opacity:0;box-shadow:-80px -34px #ffe27a,74px -44px #ffb02e,-70px 38px #fff3b0,86px 34px #d99022,-34px -72px #fff,38px 76px #ffe27a}}

</style>
</head>
<body>
<div id="app"><div class="game"><div class="ui" id="ui"></div></div></div>
<script>
const ui=document.getElementById("ui");
let screen="select",deck=[],jk=4,turn=1,playerCount=2,phase="menu",dice=1,must=0,opened=0,over=false,turnShots=0;const PCLR=["#ff3b5f","#2f8cff","#29d46b","#ffb02e"];
let ctx,sfxOn=true,bgmOn=false,bgmTimer,bgmStep=0;
let g2={};

function audio(){ctx=ctx||new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==="suspended")ctx.resume()}
addEventListener("pointerdown",audio,{once:true});
function tone(f,t=.07,type="square",g=.04){audio();const o=ctx.createOscillator(),v=ctx.createGain();o.type=type;o.frequency.value=f;v.gain.value=g;o.connect(v);v.connect(ctx.destination);o.start();v.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t);o.stop(ctx.currentTime+t+.01)}
function noise(g=.03,t=.035){if(!sfxOn)return;audio();const b=ctx.createBuffer(1,ctx.sampleRate*t,ctx.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const s=ctx.createBufferSource(),v=ctx.createGain();v.gain.value=g;s.buffer=b;s.connect(v);v.connect(ctx.destination);s.start()}
function kick(g=.15){if(!sfxOn)return;audio();const o=ctx.createOscillator(),v=ctx.createGain();o.type="sine";o.frequency.setValueAtTime(130,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(36,ctx.currentTime+.16);v.gain.value=g;o.connect(v);v.connect(ctx.destination);o.start();v.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.18);o.stop(ctx.currentTime+.2)}
function fx(t){if(!sfxOn)return;if(t==="roll"){for(let i=0;i<8;i++)setTimeout(()=>{noise(.03,.025);tone(170+Math.random()*260,.035,"square",.025)},i*45);return}if(t==="bad"){kick(.22);tone(90,.18,"sawtooth",.08);return}if(t==="win"){[520,660,780,1040].forEach((f,i)=>setTimeout(()=>tone(f,.08,"square",.05),i*80));return}if(t==="drop"){kick(.08);tone(260,.04,"triangle",.05);noise(.025,.025);return}if(t==="land"){kick(.13);tone(175,.055,"triangle",.045);return}tone(700,.05,"square",.04)}
function startBgm(){audio();stopBgm();bgmOn=true;bgmStep=0;let bass=[[44,0,44,0,55,0,44,0,65,0,55,0,44,0,33,0],[44,0,65,0,73,0,55,0,44,0,44,0,55,0,65,0],[55,0,55,0,82,0,73,0,65,0,55,0,44,0,55,0],[33,0,44,0,55,0,65,0,73,0,65,0,55,0,44,0]];let hat=[0,2,4,6,8,10,12,14],sn=[4,12];bgmTimer=setInterval(()=>{let sec=Math.floor(bgmStep/16)%4,s=bgmStep++%16;if([0,6,10].includes(s))kick(.075);if(hat.includes(s))noise(.01,.018);if(sn.includes(s))noise(.032,.03);let b=bass[sec][s];if(b)tone(b,.11,"sawtooth",.02)},125)}
function stopBgm(){bgmOn=false;if(bgmTimer)clearInterval(bgmTimer)}
function toggleSfx(){sfxOn=!sfxOn;renderApp()}
function toggleBgm(){bgmOn?stopBgm():startBgm();renderApp()}
function topbar(){return `<div class="row"><button class="small gold" onclick="toggleBgm()">BGM ${bgmOn?"ON":"OFF"}</button><button class="small gold" onclick="toggleSfx()">SFX ${sfxOn?"ON":"OFF"}</button></div>`}
function pips(n){return({1:["c"],2:["tl","br"],3:["tl","c","br"],4:["tl","tr","bl","br"],5:["tl","tr","c","bl","br"],6:["tl","tr","ml","mr","bl","br"]}[n]||["c"]).map(x=>`<i class="dot ${x}"></i>`).join("")}
function diceHTML(){let ready=(screen==="g2"?g2.phase==="roll":phase==="roll")&&!over&&!g2.fall;return `<div class="diceBox ${ready?"ready":""}" onclick="${screen==='g2'?'rollG2()':'rollG1()'}"><div class="dice ${(phase==="rolling"||g2.phase==="rolling")?"roll":"show"+dice}">${[1,2,3,4,5,6].map(n=>`<div class="face f${n}">${pips(n)}</div>`).join("")}</div></div>`}
function playerBar(){return `<div class="playerPick">${[2,3,4].map(n=>`<button class="pbtn ${playerCount===n?"on":""}" style="--pc:${PCLR[n-1]}" onclick="playerCount=${n};selectScreen()">${n}P</button>`).join("")}</div>`}
function turnBanner(p=turn){let c=PCLR[(p-1)%4];return `<div class="turnBanner" style="--pc:${c}"><span class="playerDot" style="--pc:${c}"></span>PLAYER ${p} TURN</div>`}
function playerChips(active){return `<div class="playerList">${Array.from({length:playerCount},(_,i)=>`<div class="playerChip ${active===i+1?"on":""}" style="--pc:${PCLR[i]}">P${i+1}</div>`).join("")}</div>`}
function applyPlayerTheme(p=turn){
 const pc=PCLR[(p-1)%4], bg=['#211326','#101b38','#102819','#2a1c0b'][(p-1)%4];
 document.documentElement.style.setProperty('--pc',pc);
 document.documentElement.style.setProperty('--pbg',bg);
}

function selectScreen(){screen="select";applyPlayerTheme(1);ui.innerHTML=`<div class="title">DICE GAMES</div>${topbar()}${playerBar()}<div class="menu"><button class="menuBtn" onclick="game1Menu()">GAME 1<br>JOKER FLIP</button><button class="menuBtn" onclick="game2Start()">GAME 2<br>DICE TOWER</button></div>`}

function chest(){return `<svg class="icon" viewBox="0 0 64 64"><rect x="10" y="20" width="44" height="34" fill="#2a1607"/><rect x="14" y="24" width="36" height="26" fill="#b56b20"/><rect x="16" y="26" width="32" height="8" fill="#f3b23b"/><rect x="26" y="31" width="12" height="15" fill="#ffe27a"/><rect x="28" y="34" width="8" height="6" fill="#1fc7e8"/><rect x="12" y="16" width="40" height="8" fill="#ffcf24"/><rect x="9" y="52" width="46" height="4" fill="#111"/></svg>`}
function clown(){return `<svg class="icon" viewBox="0 0 64 64"><rect x="16" y="8" width="32" height="10" fill="#b40023"/><rect x="10" y="12" width="12" height="12" fill="#f3c04d"/><rect x="42" y="12" width="12" height="12" fill="#f3c04d"/><rect x="18" y="18" width="28" height="30" fill="#111"/><rect x="21" y="21" width="22" height="22" fill="#f7d7a7"/><rect x="24" y="28" width="6" height="4" fill="#fff"/><rect x="34" y="28" width="6" height="4" fill="#fff"/><rect x="31" y="34" width="4" height="4" fill="#ff304d"/><rect x="26" y="40" width="12" height="2" fill="#111"/><rect x="14" y="48" width="36" height="10" fill="#111"/><rect x="18" y="50" width="28" height="7" fill="#4db7ff"/></svg>`}
function card(c,i){return c.open?`<div class="card open ${c.type==="bad"?"jokerCard":"safeCard"}">${c.type==="bad"?clown():chest()}</div>`:`<div class="card back" onclick="flip(${i})"></div>`}
function game1Shell(mid,msg=""){let count=deck.filter(x=>x.type==="bad"&&x.open).length;ui.innerHTML=`<div class="title">JOKER FLIP</div>${topbar()}${turnBanner(turn)}<div class="hud" style="--pc:${PCLR[(turn-1)%4]}"><div class="panel activeP">P${turn}<span class="big">${phase==="open"?opened+"/"+must:"GO"}</span></div><div class="panel">${diceHTML()}</div><div class="panel">JK<span class="big">${count}/${jk}</span></div></div>${playerChips(turn)}${mid}<div class="msg">${msg}</div>`}
function game1Menu(){screen="g1";phase="menu";applyPlayerTheme(turn);game1Shell(`<div class="menu">${[4,5,6,7,8].map(n=>`<button class="jk ${jk===n?"on":""}" onclick="jk=${n};game1Menu()">JOKER ${n}</button>`).join("")}<button class="go" onclick="startG1()">GO</button><button class="small red" onclick="selectScreen()">BACK</button></div>`,`JK ${jk}`)}
function startG1(){turn=1;applyPlayerTheme(turn);deck=[...Array.from({length:20-jk},()=>({type:"safe",open:false})),...Array.from({length:jk},()=>({type:"bad",open:false}))].sort(()=>Math.random()-.5);dice=1;opened=0;must=0;turnShots=0;over=false;phase="roll";fx("win");drawG1("GO")}
function drawG1(msg=""){game1Shell(`<div class="grid">${deck.map(card).join("")}</div><div class="row"><button class="small red" onclick="game1Menu()">RESET</button><button class="small gold" onclick="startG1()">RETRY</button></div>`,msg)}
function rollG1(){if(phase!=="roll"||over)return;phase="rolling";fx("roll");drawG1("GO");setTimeout(()=>{dice=Math.floor(Math.random()*6)+1;must=Math.min(dice,deck.filter(x=>!x.open).length);opened=0;turnShots=0;phase="open";drawG1("OPEN")},650)}
function flip(i){
 if(phase!=="open"||deck[i].open||over)return;
 deck[i].open=true;
 opened++;
 let bad=deck[i].type==="bad";
 if(bad)turnShots++;
 fx(bad?"bad":"safe");
 let totalOpenedJokers=deck.filter(x=>x.type==="bad"&&x.open).length;
 if(totalOpenedJokers>=jk){
  phase="wait";
  drawG1("JOKER x"+turnShots);
  setTimeout(()=>finishTurnShots(turnShots,()=>{over=true;fx("win");drawG1("WIN")}),650);
  return;
 }
 if(opened>=must){
  phase="wait";
  drawG1(turnShots?"JOKER x"+turnShots:"NO JOKER");
  setTimeout(()=>finishTurnShots(turnShots,()=>{turn=turn%playerCount+1;applyPlayerTheme(turn);phase="roll";opened=0;must=0;turnShots=0;dice=1;drawG1("GO")}),650);
 }else drawG1(bad?"JOKER":"OK")
}

/* Game2: FIXED camera reserve before drop */
function game2Start(){screen="g2";g2={player:1,dice:1,need:0,placed:0,phase:"roll",tower:[],fall:false,debt:0,w:0,h:0,busy:false,pendingSlots:0,stab:100,best:+localStorage.getItem('diceTowerBest')||0};applyPlayerTheme(g2.player);ui.innerHTML=`<div class="title">DICE TOWER</div>${topbar()}${turnBanner(g2.player)}<div class="hud" style="--pc:${PCLR[(g2.player-1)%4]}"><div class="panel activeP">HEIGHT<span class="big" id="heightNow">0</span></div><div class="panel">${diceHTML()}</div><div class="panel">STAB<span class="big" id="stabNow">100%</span></div></div>${playerChips(g2.player)}<div class="stage" id="stage"><div class="towerMini" id="towerMini"></div><div class="centerLine"></div><div class="dropGuide"></div><div class="ghostGuide" id="ghost" style="display:none"></div><div class="ground"></div><div class="stack" id="stack"></div><div class="previewDice" id="preview" style="display:none"></div></div><div class="msg" id="g2msg">ROLL</div><div class="row"><button class="small red" onclick="selectScreen()">BACK</button><button class="small gold" onclick="game2Start()">RETRY</button></div>`;setTimeout(()=>{let r=document.getElementById("stage").getBoundingClientRect();g2.w=r.width;g2.h=r.height;updateStats()},30)}
function swingX(){return Math.sin(Date.now()/330)*48}
function layoutFor(count){let ground=g2.h-90,top=ground-count*64,target=172;return{ground,cam:Math.max(0,target-top)}}
function visualCount(){return g2.tower.length+(g2.pendingSlots||0)}
function nextTop(){let c=visualCount(),L=layoutFor(c);return L.ground-c*64+L.cam}
function rollG2(){if(g2.phase!=="roll"||g2.fall)return;g2.phase="rolling";fx("roll");document.querySelector(".dice").classList.add("roll");setTimeout(()=>{g2.dice=Math.floor(Math.random()*6)+1;dice=g2.dice;g2.need=g2.dice;g2.placed=0;g2.phase="drop";g2.pendingSlots=1;renderTower();refreshG2("DROP");previewLoop()},650)}
function previewLoop(){if(screen!=="g2"||g2.phase!=="drop"||g2.fall)return;let x=g2.w/2+swingX(),p=document.getElementById("preview"),gh=document.getElementById("ghost");if(p){p.style.display="block";p.style.left=x+"px";p.style.top="106px";p.innerHTML=pips(g2.dice)}if(gh){gh.style.display="block";gh.style.left=x+"px";gh.style.top=(nextTop()+31)+"px"}requestAnimationFrame(previewLoop)}
function dropG2(){if(g2.phase!=="drop"||g2.fall||g2.busy)return;g2.busy=true;let raw=swingX(),prev=g2.tower[g2.tower.length-1],x=raw;if(prev&&Math.abs(raw-prev.x)<6)x=prev.x+(raw-prev.x)*.03;g2.pendingSlots=1;renderTower();let targetCenter=nextTop()+31,fd=document.createElement("div");fd.className="fallDie";fd.innerHTML=pips(g2.dice);fd.style.left=(g2.w/2+x)+"px";fd.style.top="106px";document.getElementById("stage").appendChild(fd);fx("drop");animateDrop(fd,x,targetCenter)}
function animateDrop(fd,x,targetCenter){
 let start=106;
 let contact=targetCenter-1; // stop 1px before contact to avoid visual clipping
 let t0=null;
 function fall(ts){
  if(!t0)t0=ts;
  let p=Math.min(1,(ts-t0)/300);
  let ease=1-Math.pow(1-p,3);
  fd.style.top=(start+(contact-start)*ease)+"px";
  if(p<1)requestAnimationFrame(fall);
  else landDie(fd,x);
 }
 requestAnimationFrame(fall);
}
function landDie(fd,x){
 fx("land");
 fd.classList.add("land");
 g2.pendingSlots=0;
 g2.tower.push({x,v:g2.dice,rot:x/8,land:true});
 if(g2.tower.length>g2.best){
  g2.best=g2.tower.length;
  localStorage.setItem('diceTowerBest',g2.best);
 }
 g2.placed++;
 g2.busy=false;
 renderTower();
 // Remove after render so there is no empty frame.
 setTimeout(()=>fd.remove(),20);
 if(g2.placed>=g2.need)setTimeout(nextG2,450);
 else{g2.pendingSlots=1;renderTower()}
 refreshG2(g2.placed+"/"+g2.need);
}
function renderTower(){let stack=document.getElementById("stack");if(!stack)return;let c=visualCount(),L=layoutFor(c),html="";g2.tower.forEach((b,i)=>{let y=L.ground-(i+1)*64+L.cam;html+=`<div class="towerDie ${b.land?"land":""}" style="left:calc(50% - 31px + ${b.x}px);top:${y}px;transform:rotate(${b.rot}deg)">${pips(b.v)}</div>`;b.land=false});stack.innerHTML=html;let avg=g2.tower.reduce((a,b)=>a+b.x,0)/(g2.tower.length||1),last=g2.tower.at(-1),prev=g2.tower.at(-2),mis=prev?Math.abs(last.x-prev.x):0,total=g2.tower.reduce((a,b,i)=>i?a+Math.abs(b.x-g2.tower[i-1].x):a,0),rot=g2.tower.reduce((a,b)=>a+Math.abs(b.rot),0),danger=Math.abs(avg)*1.32+total*1.19+rot*1.06+g2.tower.length*.55;if(mis>26)g2.debt+=8;else g2.debt=Math.max(0,g2.debt-3);if(danger>70)g2.debt+=2;let bal=document.getElementById("bal");if(bal)bal.textContent=Math.round(avg);let st=document.getElementById("stage");if(st)st.classList.toggle("warn",danger>62);g2.stab=Math.max(0,100-(danger*.93)-g2.debt*.6);let sway=Math.sin(Date.now()/110)*Math.min(16,mis*.35+Math.abs(avg)*.08+g2.tower.length*.2);stack.style.transform=`translateX(${sway}px) rotate(${sway*.12}deg)`;stack.classList.toggle("dangerShake",danger>78);updateStats();if(g2.tower.length&& (Math.abs(avg)>76||mis>31||g2.debt>54||g2.stab<=0))collapseG2()}
function nextG2(){
 if(g2.fall)return;
 g2.pendingSlots=0;
 const pv=document.getElementById("preview");if(pv)pv.style.display="none";
 const gh=document.getElementById("ghost");if(gh)gh.style.display="none";
 advanceG2Player();
}
function advanceG2Player(){
 if(g2.fall)return;
 g2.player=(g2.player%playerCount)+1;
 applyPlayerTheme(g2.player);
 g2.phase="roll";g2.need=0;g2.placed=0;dice=1;
 const tb=document.querySelector(".turnBanner");if(tb)tb.outerHTML=turnBanner(g2.player);
 const chips=document.querySelector(".playerList");if(chips)chips.outerHTML=playerChips(g2.player);
 const hud=document.querySelector(".hud");if(hud)hud.style.setProperty("--pc",PCLR[(g2.player-1)%4]);
 updateStats();
 refreshG2("ROLL");
}
function refreshG2(msg){document.querySelector(".hud .panel:nth-child(2)").innerHTML=diceHTML();let gm=document.getElementById("g2msg");if(gm)gm.textContent=msg;updateStats()}

function updateStats(){
 let h=document.getElementById("heightNow"),s=document.getElementById("stabNow");
 if(h)h.textContent=g2.tower?g2.tower.length:0;
 if(s)s.textContent=Math.max(0,Math.round(g2.stab||100))+"%";
 renderMini();
}
function renderMini(){
 let mini=document.getElementById("towerMini"); if(!mini||!g2.tower)return;
 let html="",cx=29,base=84,scaleY=Math.min(5,78/Math.max(1,g2.tower.length));
 g2.tower.forEach((b,i)=>{
  let x=cx+(b.x||0)*.12-3,y=base-(i+1)*scaleY;
  html+=`<i class="miniDie" style="left:${x}px;top:${y}px"></i>`;
 });
 mini.innerHTML=html;
}
function collapseAnim(){
 let stage=document.getElementById("stage"),stack=document.getElementById("stack");
 if(!stage||!g2.tower)return;
 stage.classList.add("collapseFlash");
 let L=layoutFor(g2.tower.length);
 g2.tower.forEach((b,i)=>{
  let d=document.createElement("div");
  d.className="collapseDie";
  d.innerHTML=pips(b.v);
  let y=L.ground-(i+1)*64+L.cam, x=g2.w/2-31+b.x;
  d.style.left=x+"px"; d.style.top=y+"px";
  stage.appendChild(d);
  setTimeout(()=>{
   let dir=(b.x>=0?1:-1)*(80+Math.random()*90);
   d.style.left=(x+dir)+"px";
   d.style.top=(g2.h-90+Math.random()*35)+"px";
   d.style.transform=`rotate(${(dir>0?1:-1)*(90+Math.random()*220)}deg) scale(.96)`;
   d.style.opacity=".85";
  },30+i*22);
 });
 if(stack)stack.innerHTML="";
}
function collapseG2(){
 if(g2.fall)return;
 g2.fall=true;
 g2.phase="end";
 g2.pendingSlots=0;
 fx("bad");
 collapseAnim();
 let best=Math.max(g2.best||0,g2.tower.length);
 localStorage.setItem('diceTowerBest',best);
 document.getElementById("g2msg").textContent="LOSE "+g2.tower.length+" / BEST "+best;
 document.getElementById("stage").classList.add("warn");
 updateStats();
 setTimeout(()=>drinkShots(1,()=>{}),650);
}
document.addEventListener("click",e=>{if(screen==="g2"&&e.target.closest("#stage"))dropG2()});
setInterval(()=>{if(screen==="g2"&&g2.tower?.length&&!g2.fall&&!g2.busy)renderTower()},120);

function finishTurnShots(total,callback){
 // After cards are visible, show cups only if this turn opened Jokers.
 if(total>0)drinkShots(total,callback);
 else if(callback)callback();
}
function drinkShots(total,callback){
 const host=document.querySelector(".game");
 if(!host){if(callback)callback();return}
 let drank=0,busy=false;
 const layer=document.createElement("div");
 layer.className="shotTrans";
 function paint(){
  layer.innerHTML=`<div class="shotTray onlyCups">${Array.from({length:total},(_,i)=>`<div class="shotCup ${i<drank?"empty":""}" style="animation-delay:${i*.035}s"></div>`).join("")}</div>`;
 }
 paint();
 host.appendChild(layer);
 layer.addEventListener("click",e=>{
  e.stopPropagation();
  if(busy||drank>=total)return;
  busy=true;
  const cups=[...layer.querySelectorAll(".shotCup")];
  const cup=cups[drank];
  if(cup)cup.classList.add("drink");
  const flash=document.createElement("div");
  flash.className="shotFlash";
  layer.appendChild(flash);
  fx("drop");
  setTimeout(()=>{
   drank++;
   paint();
   if(drank>=total){
    setTimeout(()=>{fx("win");layer.remove();if(callback)callback()},280);
   }else busy=false;
  },340);
 });
}

function renderApp(){if(screen==="select")selectScreen();else if(screen==="g1")phase==="menu"?game1Menu():drawG1("");else game2Start()}
selectScreen();
</script>
