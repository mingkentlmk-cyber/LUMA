<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>潜水呼吸模拟器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0a1628;
  color: #e6edf3;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow: hidden;
}

.bg-bubbles {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.bubble {
  position: absolute;
  bottom: -50px;
  background: rgba(88, 166, 255, 0.15);
  border-radius: 50%;
  animation: rise linear infinite;
}

@keyframes rise {
  0% { transform: translateY(0) scale(1); opacity: 0.6; }
  100% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
}

.card {
  position: relative;
  z-index: 1;
  background: linear-gradient(145deg, #0d1f35, #0a1628);
  border-radius: 24px;
  padding: 40px 30px;
  width: 100%;
  max-width: 340px;
  text-align: center;
  border: 1px solid #1e3a5f;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.05);
}

.depth-display {
  font-size: 64px;
  font-weight: 200;
  color: #58a6ff;
  text-shadow: 0 0 40px rgba(88, 166, 255, 0.4);
  line-height: 1;
}

.depth-unit {
  font-size: 16px;
  color: #58a6ff;
  opacity: 0.6;
  margin-left: 8px;
}

.depth-label {
  font-size: 11px;
  color: #484f58;
  letter-spacing: 3px;
  margin-top: 8px;
}

.state-ring {
  width: 180px;
  height: 180px;
  margin: 30px auto;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.state-ring svg {
  position: absolute;
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.state-ring circle {
  fill: none;
  stroke-width: 4;
}

.state-ring .bg {
  stroke: #1e3a5f;
}

.state-ring .progress {
  stroke: #58a6ff;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.1s, stroke 0.3s;
  filter: drop-shadow(0 0 8px currentColor);
}

.state-ring .breathing-icon {
  font-size: 48px;
  transition: all 0.3s;
}

.state-ring.idle .breathing-icon { color: #484f58; }
.state-ring.inhale .breathing-icon { color: #79c0ff; }
.state-ring.exhale .breathing-icon { color: #3fb950; }

.volume-bar {
  height: 6px;
  background: #0d1f35;
  border-radius: 3px;
  margin: 25px 0;
  overflow: hidden;
}

.volume-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #58a6ff, #3fb950);
  border-radius: 3px;
  transition: width 0.05s;
}

.info {
  font-size: 12px;
  color: #484f58;
  line-height: 1.8;
}

.info span { color: #58a6ff; }

button {
  background: linear-gradient(135deg, #238636, #2ea043);
  color: white;
  border: none;
  padding: 16px 50px;
  font-size: 16px;
  border-radius: 30px;
  cursor: pointer;
  margin-top: 25px;
  font-weight: 500;
  box-shadow: 0 4px 20px rgba(35, 134, 54, 0.4);
  transition: all 0.2s;
}

button:active { transform: scale(0.96); }
button:disabled { opacity: 0.5; }

.depth-indicator {
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  height: 200px;
  width: 4px;
  background: #1e3a5f;
  border-radius: 2px;
}

.depth-fill {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: #58a6ff;
  border-radius: 2px;
  transition: height 0.3s;
  box-shadow: 0 0 10px rgba(88, 166, 255, 0.5);
}

.debug {
  margin-top: 20px;
  font-size: 10px;
  color: #30363d;
  font-family: monospace;
}
</style>
</head>
<body>

<div class="bg-bubbles" id="bgBubbles"></div>

<div class="card">
  <div class="depth-label">当前深度</div>
  <div class="depth-display">
    <span id="depthValue">0</span><span class="depth-unit">m</span>
  </div>
  
  <div class="state-ring idle" id="stateRing">
    <svg viewBox="0 0 100 100">
      <circle class="bg" cx="50" cy="50" r="45"/>
      <circle class="progress" id="progressRing" cx="50" cy="50" r="45" 
              stroke-dasharray="283" stroke-dashoffset="283"/>
    </svg>
    <div class="breathing-icon" id="breathIcon">⚪</div>
  </div>
  
  <div class="volume-bar">
    <div class="volume-fill" id="volumeFill"></div>
  </div>
  
  <div class="info">
    对着手机<span>底部麦克风</span>呼吸<br>
    <span style="color:#79c0ff">短吹气</span> = 吸气 | <span style="color:#3fb950">长吹气</span> = 吐气
  </div>
  
  <button id="startBtn">开始潜水</button>
</div>

<script>
// ═══════════════════════════════════════════════════════
// 潜水呼吸音效引擎
// ═══════════════════════════════════════════════════════

class DiveSoundEngine {
  constructor() {
    this.ctx = null;
    this.isInit = false;
    
    // 主音量
    this.masterGain = null;
    
    // 吸气相关
    this.inhaleNodes = null;
    this.inhaleGain = null;
    
    // 吐气相关
    this.exhaleNodes = null;
    this.exhaleGain = null;
    
    // 气泡生成器
    this.bubbleTimeout = null;
  }
  
  async init() {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    this.ctx = new AudioContext();
    
    if (this.ctx.state === 'suspended') {
      await this.ctx.resume();
    }
    
    // 主音量
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0.7;
    this.masterGain.connect(this.ctx.destination);
    
    // 初始化两个通道
    this.inhaleNodes = this.createInhaleNodes();
    this.exhaleNodes = this.createExhaleNodes();
    
    // 初始音量设为0
    this.inhaleGain = this.ctx.createGain();
    this.inhaleGain.gain.value = 0;
    this.inhaleNodes.output.connect(this.inhaleGain);
    this.inhaleGain.connect(this.masterGain);
    
    this.exhaleGain = this.ctx.createGain();
    this.exhaleGain.gain.value = 0;
    this.exhaleNodes.output.connect(this.exhaleGain);
    this.exhaleGain.connect(this.masterGain);
    
    this.isInit = true;
  }
  
  // 创建吸气音效（尖啸的高频气流声）
  createInhaleNodes() {
    const output = this.ctx.createGain();
    output.gain.value = 1;
    
    // 1. 白噪声源
    const bufferSize = this.ctx.sampleRate * 2;
    const noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }
    
    const noise = this.ctx.createBufferSource();
    noise.buffer = noiseBuffer;
    noise.loop = true;
    
    // 2. 高通滤波器（模拟气流尖啸）
    const highpass = this.ctx.createBiquadFilter();
    highpass.type = 'highpass';
    highpass.frequency.value = 2000;
    highpass.Q.value = 2;
    
    // 3. 带通滤波器（增加金属感）
    const bandpass = this.ctx.createBiquadFilter();
    bandpass.type = 'bandpass';
    bandpass.frequency.value = 3500;
    bandpass.Q.value = 5;
    
    // 4. 另一个噪声用于高频啸叫
    const hissBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const hissData = hissBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      hissData[i] = Math.random() * 2 - 1;
    }
    
    const hiss = this.ctx.createBufferSource();
    hiss.buffer = hissBuffer;
    hiss.loop = true;
    
    const hissFilter = this.ctx.createBiquadFilter();
    hissFilter.type = 'highpass';
    hissFilter.frequency.value = 6000;
    hissFilter.Q.value = 3;
    
    const hissGain = this.ctx.createGain();
    hissGain.gain.value = 0.3;
    
    // 5. 低频振荡器模拟气流通过阀门
    const lfo = this.ctx.createOscillator();
    lfo.frequency.value = 8;
    lfo.type = 'sine';
    
    const lfoGain = this.ctx.createGain();
    lfoGain.gain.value = 500;
    
    const lfoFilter = this.ctx.createBiquadFilter();
    lfoFilter.type = 'bandpass';
    lfoFilter.frequency.value = 3000;
    lfoFilter.Q.value = 2;
    
    // 连接节点
    noise.connect(highpass);
    highpass.connect(bandpass);
    bandpass.connect(output);
    
    hiss.connect(hissFilter);
    hissFilter.connect(hissGain);
    hissGain.connect(output);
    
    lfo.connect(lfoGain);
    lfoGain.connect(lfoFilter);
    lfoFilter.connect(output);
    
    // 启动
    noise.start();
    hiss.start();
    lfo.start();
    
    return { output, noise, hiss, lfo, highpass, bandpass, hissFilter, lfoFilter };
  }
  
  // 创建吐气音效（大量气泡）
  createExhaleNodes() {
    const output = this.ctx.createGain();
    output.gain.value = 1;
    
    // 1. 低频基础（气泡在水下的低沉感）
    const bufferSize = this.ctx.sampleRate * 2;
    const noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }
    
    const noise = this.ctx.createBufferSource();
    noise.buffer = noiseBuffer;
    noise.loop = true;
    
    // 低通滤波
    const lowpass = this.ctx.createBiquadFilter();
    lowpass.type = 'lowpass';
    lowpass.frequency.value = 800;
    lowpass.Q.value = 1;
    
    // 2. 中频气泡声
    const bubbleNoise = this.ctx.createBufferSource();
    bubbleNoise.buffer = noiseBuffer;
    bubbleNoise.loop = true;
    
    const bandpass = this.ctx.createBiquadFilter();
    bandpass.type = 'bandpass';
    bandpass.frequency.value = 400;
    bandpass.Q.value = 2;
    
    const bubbleGain = this.ctx.createGain();
    bubbleGain.gain.value = 0.8;
    
    // 3. 高频爆裂声（随机气泡）
    const crackleBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const crackleData = crackleBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      crackleData[i] = Math.random() * 2 - 1;
    }
    
    const crackle = this.ctx.createBufferSource();
    crackle.buffer = crackleBuffer;
    crackle.loop = true;
    
    const highpass = this.ctx.createBiquadFilter();
    highpass.type = 'highpass';
    highpass.frequency.value = 1500;
    highpass.Q.value = 1;
    
    const crackleGain = this.ctx.createGain();
    crackleGain.gain.value = 0.4;
    
    // 连接
    noise.connect(lowpass);
    lowpass.connect(output);
    
    bubbleNoise.connect(bandpass);
    bandpass.connect(bubbleGain);
    bubbleGain.connect(output);
    
    crackle.connect(highpass);
    highpass.connect(crackleGain);
    crackleGain.connect(output);
    
    // 启动
    noise.start();
    bubbleNoise.start();
    crackle.start();
    
    return { output, noise, bubbleNoise, crackle, lowpass, bandpass, highpass, bubbleGain, crackleGain };
  }
  
  // 设置吸气音量（0-1，根据用户力度）
  setInhaleVolume(vol) {
    if (!this.isInit || !this.inhaleGain) return;
    const targetVol = Math.min(vol * 2, 1);
    this.inhaleGain.gain.linearRampToValueAtTime(
      targetVol, 
      this.ctx.currentTime + 0.05
    );
  }
  
  // 设置吐气音量（0-1，根据用户力度）
  setExhaleVolume(vol) {
    if (!this.isInit || !this.exhaleGain) return;
    const targetVol = Math.min(vol * 2.5, 1);
    this.exhaleGain.gain.linearRampToValueAtTime(
      targetVol,
      this.ctx.currentTime + 0.05
    );
  }
  
  // 停止所有声音
  stopAll() {
    if (!this.isInit) return;
    if (this.inhaleGain) {
      this.inhaleGain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.1);
    }
    if (this.exhaleGain) {
      this.exhaleGain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.1);
    }
  }
  
  // 释放资源
  dispose() {
    if (this.ctx) {
      this.ctx.close();
    }
  }
}

// ═══════════════════════════════════════════════════════
// 检测和控制逻辑
// ═══════════════════════════════════════════════════════

const CONFIG = {
  threshold: 0.06,
  inhaleMaxTime: 3500,   // 吸气最大3.5秒
  exhaleMinTime: 2000,   // 吐气最小2秒
  maxInhaleTime: 5000,   // 吸气最常5秒
  maxExhaleTime: 15000,  // 吐气最常15秒
  pauseTime: 1500,       // 暂停1.5秒
  minVolume: 0.08,
  cooldown: 300
};

let audioEngine = null;
let audioCtx = null;
let analyser = null;
let isRunning = false;

// 状态变量
let breathStartTime = null;
let breathPeakVolume = 0;
let breathStartVolume = 0;
let lastState = 'idle';
let lastStateTime = 0;
let isBreathing = false;
let currentPhase = 'idle'; // idle, inhale, pause, exhale

// 深度相关
let currentDepth = 0;
let targetDepth = 0;

// DOM元素
const stateRing = document.getElementById('stateRing');
const progressRing = document.getElementById('progressRing');
const breathIcon = document.getElementById('breathIcon');
const volumeFill = document.getElementById('volumeFill');
const depthValue = document.getElementById('depthValue');
const depthFill = document.querySelector('.depth-fill');
const startBtn = document.getElementById('startBtn');
const bgBubbles = document.getElementById('bgBubbles');

const PHASE_CONFIG = {
  idle: { icon: '⚪', color: '#484f58', maxTime: 0 },
  inhale: { icon: '◉', color: '#58a6ff', maxTime: CONFIG.maxInhaleTime },
  pause: { icon: '◌', color: '#8b949e', maxTime: CONFIG.pauseTime },
  exhale: { icon: '◎', color: '#3fb950', maxTime: CONFIG.maxExhaleTime }
};

// 气泡背景
function createBubble() {
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  const size = Math.random() * 20 + 5;
  bubble.style.width = size + 'px';
  bubble.style.height = size + 'px';
  bubble.style.left = Math.random() * 100 + '%';
  bubble.style.animationDuration = (Math.random() * 8 + 6) + 's';
  bgBubbles.appendChild(bubble);
  
  setTimeout(() => {
    bubble.remove();
  }, 14000);
}

function startBubbles() {
  createBubble();
  setInterval(createBubble, 400);
}

startBtn.addEventListener('click', async () => {
  startBtn.disabled = true;
  startBtn.textContent = '启动中...';
  
  try {
    await initAudio();
    audioEngine = new DiveSoundEngine();
    await audioEngine.init();
    
    startBtn.style.display = 'none';
    isRunning = true;
    startBubbles();
    detectLoop();
  } catch (e) {
    console.error(e);
    alert('麦克风权限被拒绝: ' + e.message);
    startBtn.disabled = false;
    startBtn.textContent = '重试';
  }
});

async function initAudio() {
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  audioCtx = new AudioContext();
  
  if (audioCtx.state === 'suspended') {
    await audioCtx.resume();
  }
  
  const stream = await navigator.mediaDevices.getUserMedia({
    audio: {
      echoCancellation: false,
      noiseSuppression: false,
      autoGainControl: false
    }
  });
  
  const source = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  analyser.smoothingTimeConstant = 0.3;
  source.connect(analyser);
}

function getVolume() {
  const data = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(data);
  
  let sum = 0;
  for (let i = 0; i < data.length; i++) {
    const v = (data[i] - 128) / 128;
    sum += v * v;
  }
  return Math.sqrt(sum / data.length);
}

function detectLoop() {
  if (!isRunning) return;
  requestAnimationFrame(detectLoop);
  
  const rms = getVolume();
  const now = Date.now();
  const volPercent = Math.min(rms * 500, 100);
  
  volumeFill.style.width = volPercent + '%';
  
  // 根据当前阶段更新音效
  if (currentPhase === 'inhale') {
    const intensity = Math.max(0, (rms - CONFIG.threshold) / 0.5);
    audioEngine.setInhaleVolume(intensity);
  } else if (currentPhase === 'exhale') {
    const intensity = Math.max(0, (rms - CONFIG.threshold) / 0.4);
    audioEngine.setExhaleVolume(intensity);
  } else {
    audioEngine.stopAll();
  }
  
  // 阶段超时检查
  if (currentPhase !== 'idle') {
    const phaseConfig = PHASE_CONFIG[currentPhase];
    const phaseElapsed = now - lastStateTime;
    
    if (phaseElapsed > phaseConfig.maxTime) {
      // 自动切换到下一阶段
      switchPhase(currentPhase === 'inhale' ? 'pause' : 'idle', now);
    }
  }
  
  // 音量检测（只在pause或idle阶段响应新呼吸）
  if (currentPhase === 'idle' || currentPhase === 'pause') {
    if (rms > CONFIG.threshold) {
      if (!isBreathing) {
        isBreathing = true;
        breathStartTime = now;
        breathPeakVolume = rms;
        breathStartVolume = rms;
      } else {
        if (rms > breathPeakVolume) {
          breathPeakVolume = rms;
        }
        
        const duration = now - breathStartTime;
        
        // 强制切换检查
        if (duration > CONFIG.maxInhaleTime) {
          switchPhase('exhale', now);
        } else if (currentPhase === 'pause' && duration > 500) {
          // 暂停期间持续吹气，转为吐气
          switchPhase('exhale', now);
        } else if (currentPhase === 'idle' && duration > CONFIG.exhaleMinTime) {
          // 持续时间长 → 吐气
          switchPhase('exhale', now);
        } else if (currentPhase === 'idle' && duration > CONFIG.inhaleMaxTime && 
                   breathPeakVolume > CONFIG.minVolume * 1.5) {
          // 吹气强且时间长 → 吐气
          switchPhase('exhale', now);
        } else if (currentPhase === 'idle' && duration < CONFIG.inhaleMaxTime) {
          // 短吹 → 吸气
          switchPhase('inhale', now);
        }
      }
    } else {
      if (isBreathing) {
        // 呼吸结束
        isBreathing = false;
        
        const duration = now - breathStartTime;
        
        if (currentPhase === 'inhale' && duration < CONFIG.maxInhaleTime) {
          // 吸气结束，进入暂停
          switchPhase('pause', now);
        } else if (currentPhase === 'exhale' || currentPhase === 'pause') {
          // 吐气结束
          switchPhase('idle', now);
        }
        
        breathStartTime = null;
        breathPeakVolume = 0;
      }
    }
  }
  
  // 更新深度显示
  updateDepth();
}

function switchPhase(phase, time) {
  currentPhase = phase;
  lastStateTime = time;
  
  const config = PHASE_CONFIG[phase];
  
  // 更新UI
  stateRing.className = `state-ring ${phase}`;
  breathIcon.textContent = config.icon;
  progressRing.style.stroke = config.color;
  
  // 重置进度条
  progressRing.style.strokeDashoffset = 283;
  
  // 开始进度动画
  if (phase !== 'idle') {
    animateProgress(phase);
  }
  
  // 调整音量
  if (phase === 'idle' || phase === 'pause') {
    audioEngine.stopAll();
  }
}

function animateProgress(phase) {
  const maxTime = PHASE_CONFIG[phase].maxTime;
  const startTime = lastStateTime;
  
  function update() {
    if (currentPhase !== phase) return;
    
    const elapsed = Date.now() - startTime;
    const progress = Math.min(elapsed / maxTime, 1);
    const offset = 283 * (1 - progress);
    
    progressRing.style.strokeDashoffset = offset;
    
    if (progress < 1 && isRunning) {
      requestAnimationFrame(update);
    }
  }
  
  update();
}

function updateDepth() {
  // 根据状态计算虚拟深度
  if (currentPhase === 'inhale') {
    targetDepth = Math.min(targetDepth + 0.15, 30);
  } else if (currentPhase === 'exhale') {
    targetDepth = Math.max(targetDepth - 0.08, 0);
  } else {
    targetDepth = Math.max(targetDepth - 0.02, 0);
  }
  
  currentDepth += (targetDepth - currentDepth) * 0.1;
  depthValue.textContent = currentDepth.toFixed(1);
}

// 页面关闭时清理
window.addEventListener('beforeunload', () => {
  if (audioEngine) {
    audioEngine.dispose();
  }
});
</script>
</body>
</html>
