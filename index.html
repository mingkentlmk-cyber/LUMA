<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>呼吸检测</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #161b22;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            border: 1px solid #30363d;
        }
        h1 { font-size: 14px; color: #8b949e; letter-spacing: 2px; margin-bottom: 30px; }
        .state {
            font-size: 48px;
            font-weight: 300;
            min-height: 60px;
            transition: all 0.2s;
        }
        .state.idle { color: #484f58; }
        .state.inhale { color: #58a6ff; text-shadow: 0 0 30px rgba(88,166,255,0.5); }
        .state.exhale { color: #3fb950; text-shadow: 0 0 30px rgba(63,185,80,0.5); }
        
        .volume-bar {
            height: 8px;
            background: #21262d;
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }
        .volume-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #58a6ff, #3fb950);
            transition: width 0.05s;
            border-radius: 4px;
        }
        
        .info {
            font-size: 12px;
            color: #8b949e;
            margin-top: 15px;
            line-height: 1.8;
        }
        .info span { color: #58a6ff; }
        
        button {
            background: #238636;
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:disabled { opacity: 0.5; }
        
        .debug {
            margin-top: 20px;
            font-size: 11px;
            color: #484f58;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>呼吸状态检测</h1>
        
        <div id="state" class="state idle">待机</div>
        
        <div class="volume-bar">
            <div id="volumeFill" class="volume-fill"></div>
        </div>
        
        <button id="startBtn">开始</button>
        
        <div class="info">
            对着手机<span>底部麦克风</span>呼吸<br>
            短吹气 = 吸气 / 长吹气 = 呼气
        </div>
        
        <div class="debug" id="debug"></div>
    </div>

    <script>
        // 配置参数
        const CONFIG = {
            threshold: 0.08,      // 触发阈值
            inhaleMaxTime: 1200,  // 吸气最大持续时间(ms)
            exhaleMinTime: 1500,  // 呼气最小持续时间(ms)
            cooldown: 400,        // 状态切换冷却时间(ms)
            minVolume: 0.1        // 有效呼吸最小音量
        };

        let audioCtx, analyser;
        let isRunning = false;
        
        // 状态变量
        let breathStartTime = null;
        let breathPeakVolume = 0;
        let lastState = 'idle';
        let lastStateTime = 0;
        let isBreathing = false;

        const stateEl = document.getElementById('state');
        const volumeFill = document.getElementById('volumeFill');
        const debugEl = document.getElementById('debug');
        const startBtn = document.getElementById('startBtn');

        const STATE_TEXT = {
            idle: '待机',
            inhale: '吸气',
            exhale: '呼气'
        };

        const STATE_CLASS = {
            idle: 'idle',
            inhale: 'inhale',
            exhale: 'exhale'
        };

        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            startBtn.textContent = '启动中...';
            
            try {
                await initAudio();
                startBtn.style.display = 'none';
                isRunning = true;
                detectLoop();
            } catch (e) {
                alert('麦克风权限被拒绝');
                startBtn.disabled = false;
                startBtn.textContent = '重试';
            }
        });

        async function initAudio() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            // 获取麦克风
            const stream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    echoCancellation: false,
                    noiseSuppression: false,
                    autoGainControl: false
                }
            });

            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 512;
            analyser.smoothingTimeConstant = 0.5;
            source.connect(analyser);
        }

        function detectLoop() {
            if (!isRunning) return;
            requestAnimationFrame(detectLoop);

            // 获取音量
            const rms = getVolume();
            const now = Date.now();

            // 更新音量条
            const volPercent = Math.min(rms * 400, 100);
            volumeFill.style.width = volPercent + '%';

            // 调试信息
            debugEl.innerHTML = `音量: ${rms.toFixed(4)}<br>状态: ${lastState}`;

            // 检测逻辑
            if (rms > CONFIG.threshold) {
                // 开始呼吸
                if (!isBreathing) {
                    isBreathing = true;
                    breathStartTime = now;
                    breathPeakVolume = rms;
                } else {
                    // 更新峰值
                    if (rms > breathPeakVolume) {
                        breathPeakVolume = rms;
                    }
                    
                    // 计算持续时间
                    const duration = now - breathStartTime;
                    
                    // 冷却时间内不切换
                    if (now - lastStateTime < CONFIG.cooldown) return;
                    
                    // 判断是吸气还是呼气
                    if (duration < CONFIG.inhaleMaxTime && breathPeakVolume < CONFIG.minVolume * 2) {
                        // 持续时间短 → 吸气
                        if (lastState !== 'inhale') {
                            setState('inhale', now);
                        }
                    } else if (duration > CONFIG.exhaleMinTime) {
                        // 持续时间长 → 呼气
                        if (lastState !== 'exhale') {
                            setState('exhale', now);
                        }
                    }
                }
            } else {
                // 呼吸结束
                if (isBreathing) {
                    isBreathing = false;
                    breathStartTime = null;
                    breathPeakVolume = 0;
                    
                    // 短暂延迟后恢复待机
                    setTimeout(() => {
                        if (!isBreathing) {
                            setState('idle', Date.now());
                        }
                    }, 300);
                }
            }
        }

        function getVolume() {
            const data = new Uint8Array(analyser.fftSize);
            analyser.getByteTimeDomainData(data);
            
            let sum = 0;
            for (let i = 0; i < data.length; i++) {
                const v = (data[i] - 128) / 128;
                sum += v * v;
            }
            return Math.sqrt(sum / data.length);
        }

        function setState(state, time) {
            lastState = state;
            lastStateTime = time;
            stateEl.textContent = STATE_TEXT[state];
            stateEl.className = 'state ' + STATE_CLASS[state];
            
            // 音量条颜色
            if (state === 'inhale') {
                volumeFill.style.background = 'linear-gradient(90deg, #58a6ff, #79c0ff)';
            } else if (state === 'exhale') {
                volumeFill.style.background = 'linear-gradient(90deg, #3fb950, #56d364)';
            } else {
                volumeFill.style.background = '#484f58';
            }
        }
    </script>
</body>
</html>
