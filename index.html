<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>狼人杀抽卡</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:#070914;color:#fff;font-family:monospace;overflow:hidden}
.app{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:12px;background:radial-gradient(circle at top,#26386b,#070914 65%)}
.screen{width:100%;max-width:430px;min-height:700px;position:relative;overflow:hidden;background:#101832;border:5px solid #ffe27a;box-shadow:0 0 0 5px #000,0 0 24px #4d7cff;padding:20px}
.screen:before{content:"";position:absolute;inset:0;background:linear-gradient(transparent 50%,rgba(255,255,255,.035) 51%);background-size:100% 6px;pointer-events:none}
.bg-dot{position:absolute;width:4px;height:4px;background:#fff;opacity:.55}
.moon{position:absolute;right:24px;top:28px;width:46px;height:46px;background:#ffeaa7;box-shadow:0 0 18px #ffeaa7}
.hill{position:absolute;left:0;right:0;bottom:0;height:90px;background:linear-gradient(#18213d,#06070d);border-top:4px solid #29395f}
.content{position:relative;z-index:2}
.title{text-align:center;font-size:34px;font-weight:900;color:#ffe27a;letter-spacing:2px;text-shadow:3px 3px #000,5px 5px #5f3cff;margin:20px 0 6px}
.sub{text-align:center;color:#9be7ff;margin-bottom:24px}
.btn{width:100%;margin:11px 0;padding:16px;border:4px solid #fff;background:#283f7a;color:#fff;font-size:19px;font-weight:900;font-family:monospace;box-shadow:5px 5px #000;text-shadow:2px 2px #000}
.btn:active{transform:translate(3px,3px);box-shadow:2px 2px #000}
.gold{background:#a36a13;color:#fff3b0}.green{background:#17724e}.red{background:#8b2137}
.panel{background:#0a1024;border:4px solid #fff;padding:14px;line-height:1.7;box-shadow:4px 4px #000;color:#dfe6ff}
.card-zone{height:355px;display:flex;align-items:center;justify-content:center}
.card{width:250px;height:335px;background:linear-gradient(150deg,#283764,#12192d);border:5px solid #fff;box-shadow:0 0 0 5px #000,0 0 20px #4d7cff;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;animation:float 1.7s ease-in-out infinite}
.card:before{content:"";position:absolute;inset:13px;border:3px dashed #ffe27a}
.card.reveal{animation:flip .45s ease, glow 1s alternate infinite}
.q{font-size:100px;color:#ffe27a;text-shadow:6px 6px #000}
.role{font-size:34px;font-weight:900;color:#ffe27a;text-shadow:4px 4px #000;margin-top:12px}
.notice{text-align:center;margin-top:78px;font-size:24px;line-height:1.7;text-shadow:3px 3px #000}
.hl{font-size:30px;color:#ffe27a}
.footer{position:absolute;bottom:10px;left:0;width:100%;text-align:center;font-size:12px;color:#7d8fb9}
.art{width:150px;height:150px;display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);gap:2px;z-index:3}
.p{background:var(--c)}
@keyframes float{50%{transform:translateY(-9px)}}
@keyframes flip{0%{transform:rotateY(90deg) scale(.9)}100%{transform:rotateY(0) scale(1)}}
@keyframes glow{to{box-shadow:0 0 0 5px #000,0 0 32px #ffe27a}}
</style>
</head>
<body>
<div class="app"><div class="screen" id="screen"></div></div>

<script>
const screen=document.getElementById("screen");
const cfg={
  3:["狼人","预言家","平民"],
  4:["狼人","预言家","平民","平民"],
  5:["狼人","预言家","女巫","平民","平民"],
  6:["狼人","狼人","预言家","女巫","猎人","平民"]
};
const info={
  狼人:["狼人阵营","隐藏身份，淘汰好人。"],
  预言家:["好人阵营","每晚查验一名玩家。"],
  女巫:["好人阵营","拥有解药和毒药。"],
  猎人:["好人阵营","出局时可带走一人。"],
  平民:["好人阵营","没有技能，靠推理找狼人。"]
};
let players=[],i=0,ctx=null,lastSound=0;

function sfx(type){
  const now=Date.now();
  if(now-lastSound<90)return;
  lastSound=now;
  ctx=ctx||new (window.AudioContext||window.webkitAudioContext)();
  const seq={
    click:[520,700],
    shuffle:[260,330,420,520],
    good:[660,880,1040],
    wolf:[160,100],
    done:[520,660,780,1040]
  }[type]||[440];
  seq.forEach((f,n)=>setTimeout(()=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type=type==="wolf"?"sawtooth":"square";
    o.frequency.value=f;
    g.gain.value=.06;
    o.connect(g);g.connect(ctx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.08);
    o.stop(ctx.currentTime+.09);
  },n*70));
}
function bg(){
  let h='<div class="moon"></div><div class="hill"></div>';
  const dots=[[8,16],[18,9],[28,22],[42,13],[57,19],[70,11],[83,23],[91,15],[12,42],[35,35],[64,38],[78,47],[23,58],[52,55],[88,62]];
  dots.forEach(d=>h+=`<i class="bg-dot" style="left:${d[0]}%;top:${d[1]}%"></i>`);
  return h+'<div class="content">';
}
function end(){return '</div><div class="footer">GBA STYLE ROLE DRAW</div>'}
function shuf(a){return a.map(x=>[Math.random(),x]).sort((a,b)=>a[0]-b[0]).map(x=>x[1])}

function art(role){
  const colors={
    狼人:["#2d3436","#636e72","#ff4757"],
    预言家:["#6c5ce7","#74b9ff","#ffe27a"],
    女巫:["#2d3436","#8e44ad","#00cec9"],
    猎人:["#6ab04c","#8b5a2b","#ffe27a"],
    平民:["#f1c27d","#0984e3","#ffbe76"]
  }[role];
  const maps={
    狼人:"01000010 11111111 12211221 11122111 01111110 00111100 01100110 11000011",
    预言家:"00111100 01122110 01222210 01233210 01122110 00111100 33333333 03333330",
    女巫:"00111100 11111111 00011000 01111110 01222210 01233210 01111110 00111100",
    猎人:"00111100 01111110 02222220 02233220 02222220 30100103 30000003 03000030",
    平民:"00111100 01111110 01133110 00111100 02222220 02222220 10200201 10000001"
  }[role].split(" ").join("");
  return `<div class="art">${[...maps].map(v=>v==="0"?'<b></b>':`<b class="p" style="--c:${colors[v-1]}"></b>`).join("")}</div>`;
}

function home(){
  screen.innerHTML=bg()+`
  <div class="title">狼人杀抽卡</div>
  <div class="sub">PIXEL PARTY GAME</div>
  <button class="btn gold" onclick="start(3)">3 人局</button>
  <button class="btn gold" onclick="start(4)">4 人局</button>
  <button class="btn gold" onclick="start(5)">5 人局</button>
  <button class="btn gold" onclick="start(6)">6 人局</button>
  <div class="panel">选择人数后自动洗牌。每位玩家依次看身份，中间有安全传手机界面。</div>
  `+end();
}

function start(n){
  sfx("shuffle");
  players=shuf(cfg[n]).map((r,k)=>({name:`玩家 ${k+1}`,role:r}));
  i=0;
  setTimeout(safe,260);
}
function safe(){
  screen.innerHTML=bg()+`
  <div class="notice">请把手机交给<br><span class="hl">${players[i].name}</span></div>
  <div class="card-zone"><div class="card"><div class="q">?</div></div></div>
  <button class="btn green" onclick="reveal()">我是 ${players[i].name}，查看身份</button>
  `+end();
}
function reveal(){
  const p=players[i],d=info[p.role];
  sfx(p.role==="狼人"?"wolf":"good");
  screen.innerHTML=bg()+`
  <div class="title">${p.name}</div>
  <div class="card-zone"><div class="card reveal">${art(p.role)}<div class="role">${p.role}</div></div></div>
  <div class="panel">阵营：${d[0]}<br>目标：${d[1]}</div>
  <button class="btn red" onclick="next()">我已记住，隐藏身份</button>
  `+end();
}
function next(){
  sfx("click");
  i++;
  i>=players.length?done():safe();
}
function done(){
  sfx("done");
  screen.innerHTML=bg()+`
  <div class="title">抽卡完成</div>
  <div class="notice">所有玩家已确认身份<br><span class="hl">游戏开始</span></div>
  <div class="card-zone"><div class="card reveal"><div class="role">START</div></div></div>
  <button class="btn gold" onclick="home()">重新洗牌</button>
  <button class="btn" onclick="showAll()">查看身份总表</button>
  `+end();
}
function showAll(){
  sfx("click");
  screen.innerHTML=bg()+`
  <div class="title">身份总表</div>
  <div class="panel" style="font-size:21px">${players.map(p=>p.name+"："+p.role).join("<br>")}</div>
  <button class="btn gold" onclick="home()">重新开始</button>
  `+end();
}
home();
</script>
</body>
</html>
